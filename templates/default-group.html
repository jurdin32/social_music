{% extends 'base.html' %}
{% load static %}

{% block title %}Usuarios - Veriffai{% endblock %}

{% block content %}
<div class="row">
    <div class="col-xl-12">
        <div class="card shadow-xss w-100 d-block d-flex border-0 p-4 mb-3">
            <div class="card-body d-flex align-items-center p-0">
                <h2 class="fw-700 mb-0 mt-0 font-md text-grey-900"><i class="feather-users text-current me-2"></i>Usuarios</h2>
            </div>
        </div>

        <div class="row ps-2 pe-1" id="usuarios-grid">
        </div>

        <div id="loading-spinner" class="text-center py-4 d-none">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Cargando...</span>
            </div>
        </div>

        <div id="no-more" class="text-center py-4 d-none">
            <p class="font-xsss text-grey-400 mb-0">No hay mas usuarios</p>
        </div>
    </div>
</div>

<style>
@keyframes fadeInUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}
.usuario-card { animation: fadeInUp 0.4s ease forwards; opacity: 0; }
</style>

<script>
(function() {
    const grid = document.getElementById('usuarios-grid');
    const spinner = document.getElementById('loading-spinner');
    const noMore = document.getElementById('no-more');
    const defaultImg = "{% static 'sociala/images/user-12.png' %}";
    let offset = 0;
    const limit = 6;
    let loading = false;
    let finished = false;

    function crearCard(u, delay) {
        const portadaStyle = u.portada
            ? `background:url(${u.portada}) center/cover`
            : 'background:linear-gradient(135deg,#667eea 0%,#764ba2 100%)';
        const foto = u.foto || defaultImg;
        const btnClass = u.ya_sigo
            ? 'bg-greylight font-xsssss fw-700 ls-lg text-grey-700'
            : 'bg-current font-xsssss fw-700 ls-lg text-white';
        const btnText = u.ya_sigo ? 'SIGUIENDO' : 'SEGUIR';

        const col = document.createElement('div');
        col.className = 'col-md-6 col-sm-6 pe-2 ps-2';
        col.innerHTML = `
            <div class="usuario-card card d-block border-0 shadow-xss rounded-3 overflow-hidden mb-3" style="animation-delay:${delay}ms">
                <div class="card-body position-relative" style="height:100px;${portadaStyle};background-size:cover;background-position:center;"></div>
                <div class="card-body d-block w-100 pb-4 pt-0 text-left position-relative" style="padding-left:100px;padding-right:16px;min-height:90px;">
                    <figure class="avatar position-absolute w75 z-index-1" style="top:-38px;left:15px;">
                        <a href="/usuario/${u.username}/">
                            <img src="${foto}" alt="${u.nombre}" class="p-1 bg-white rounded-circle w-100">
                        </a>
                    </figure>
                    <a href="/usuario/${u.username}/" class="text-decoration-none">
                        <h4 class="fw-700 font-xsss mt-2 mb-1 text-grey-900">${u.nombre}</h4>
                    </a>
                    <p class="fw-500 font-xsssss text-grey-500 mt-0 mb-1">${u.email}</p>
                    <p class="fw-500 font-xsssss text-grey-500 mt-0 mb-0">
                        <strong>${u.seguidores}</strong> seguidores &middot;
                        <strong>${u.siguiendo}</strong> siguiendo
                    </p>
                    <span class="position-absolute d-flex align-items-center" style="right:16px;top:10px;">
                        <a href="/usuario/${u.username}/seguir/" class="text-center p-2 lh-24 w100 ms-1 ls-3 d-inline-block rounded-xl ${btnClass}">${btnText}</a>
                    </span>
                </div>
            </div>`;
        return col;
    }

    function cargarUsuarios() {
        if (loading || finished) return;
        loading = true;
        spinner.classList.remove('d-none');

        fetch(`/api/usuarios/?offset=${offset}&limit=${limit}`)
            .then(r => r.json())
            .then(data => {
                spinner.classList.add('d-none');
                const usuarios = data.usuarios;
                if (usuarios.length === 0) {
                    finished = true;
                    noMore.classList.remove('d-none');
                    return;
                }
                usuarios.forEach((u, i) => {
                    const card = crearCard(u, i * 100);
                    grid.appendChild(card);
                });
                offset += usuarios.length;
                if (usuarios.length < limit) {
                    finished = true;
                    noMore.classList.remove('d-none');
                }
                loading = false;
            })
            .catch(() => {
                spinner.classList.add('d-none');
                loading = false;
            });
    }

    // Detectar scroll cerca del final
    window.addEventListener('scroll', function() {
        if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 300) {
            cargarUsuarios();
        }
    });

    // Carga inicial
    cargarUsuarios();
})();
</script>
{% endblock %}
